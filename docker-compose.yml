services:
  server:
    build: ./server
    container_name: higolang-server
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - GIN_MODE=release
    restart: unless-stopped
    networks:
      - higolang

  web:
    build: ./web
    container_name: higolang-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 证书目录（放入证书文件后自动启用 HTTPS）
      - ./ssl:/etc/nginx/ssl:ro
      # certbot 续期目录
      - ./certbot-webroot:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - SSL_CERT=${SSL_CERT:-}
      - SSL_KEY=${SSL_KEY:-}
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - higolang

networks:
  higolang:
    driver: bridge
